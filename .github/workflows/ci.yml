name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package in development mode
        run: pip install -e .

      - name: Check imports work
        run: python -c "import streamlit_ai_toolkit; print('All imports successful!')"

      - name: Check syntax of pages
        run: |
          python -m py_compile app.py
          for f in pages/*.py; do python -m py_compile "$f"; done
          echo "All Python files have valid syntax"

      - name: Check package metadata
        run: python -c "import os; print('pyproject.toml exists:', os.path.exists('pyproject.toml'))"
