name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package in development mode
        run: |
          pip install -e .

      - name: Check imports work
        run: |
          python -c "
          import streamlit_ai_toolkit
          from streamlit_ai_toolkit.components.chat_ui import render_chat_interface
          from streamlit_ai_toolkit.components.file_upload import render_file_uploader
          from streamlit_ai_toolkit.components.model_selector import render_model_selector
          from streamlit_ai_toolkit.utils.ai import (
              AIProvider,
              OpenAIProvider,
              AnthropicProvider,
              OllamaProvider,
              get_ai_provider,
          )
          print('All imports successful!')
          "

      - name: Verify module structure
        run: |
          python -c "
          import sys
          import os
          
          # Check all expected modules exist
          modules = [
              'streamlit_ai_toolkit',
              'streamlit_ai_toolkit.components',
              'streamlit_ai_toolkit.components.chat_ui',
              'streamlit_ai_toolkit.components.file_upload',
              'streamlit_ai_toolkit.components.model_selector',
              'streamlit_ai_toolkit.utils',
              'streamlit_ai_toolkit.utils.ai',
          ]
          
          for module in modules:
              __import__(module)
              print(f'✓ {module}')
          
          print('\\nAll module checks passed!')
          "

      - name: Check syntax of pages
        run: |
          python -m py_compile app.py
          for f in pages/*.py; do python -m py_compile "$f"; done
          echo "All Python files have valid syntax"

      - name: Check package metadata
        run: |
          python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              config = tomllib.load(f)
          
          # Validate required fields
          project = config.get('project', {})
          assert 'name' in project, 'Missing project name'
          assert 'version' in project, 'Missing version'
          assert 'requires-python' in project, 'Missing requires-python'
          
          print(f'Package: {project[\"name\"]}')
          print(f'Version: {project[\"version\"]}')
          print(f'Requires Python: {project[\"requires-python\"]}')
          print('\\n✓ pyproject.toml validation passed!')
          "
